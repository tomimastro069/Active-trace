services:
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: active-trace-api:latest
    command: [ "alembic", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.example
    restart: "no"

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: active-trace-api:latest
    command: [ "python", "scripts/seed_dev.py" ]
    depends_on:
      migrator:
        condition: service_completed_successfully
    env_file:
      - .env.example
    restart: "no"


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: active-trace-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: active-trace-worker:latest
    command: [ "python", "-m", "app.workers.main" ]
    depends_on:
      postgres:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    env_file:
      - .env.example
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-active_trace_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

